[pytest]
# Silence two sklearn noise sources that fire heavily in the BO tests:
#   - ConvergenceWarning: GP kernel-hyperparameter MLE hitting its inner
#     L-BFGS iter cap (cosmetic — the GP still gives sensible predictions).
#   - InconsistentVersionWarning: surrogate.pkl was trained with sklearn 1.5.0;
#     a newer sklearn in the env still loads it fine.
filterwarnings =
    ignore::sklearn.exceptions.ConvergenceWarning
    ignore::sklearn.exceptions.InconsistentVersionWarning
